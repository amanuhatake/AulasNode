<html>
    <head>
        <title>Aula 05 - Funções</title>
        <script>
            //Função declarada
            function cumprimentaHelton(nome ="Manu", idade = 0, cidade = "Londrina"){ //passando parametros, deixar padrao os parametros
                console.log(`Olá,${nome} da idade ${idade}da cidade ${cidade}.Sejam bem-vindo`);
            }

            //cumprimentaHelton("Juliana" , "Cambé");
            cumprimentaHelton();

            //função na variavel
            // variavel referenciado a função, PONTEIRO -> APONTA PARA A FUNÇÃO 
            let recuperarMarca = function (modelo){//escopo definido pelo tipo da função (let), sendo assim em bloco.
                if (modelo === "Gol"){
                    return "Volkswagen"
                }else if(modelo === "Palio"){
                    return "Fiat" ; // codigo depois do return SAI DA FUNÇÃO 
                }else{
                    return "Nao encontrado"; // codigo depois do return SAI DA FUNÇÃO 
                }
            }
            //let retorno = recuperarMarca; // só chama o ponteiro
            let retorno = recuperarMarca("Gol"); // executa função
            console.log("Retorno: ", retorno);

            //Arrow Function simples
            let superHeroi = () => console.log("Spiderman");
            superHeroi();

            //Arrow Function com passagem de parametro
            let superHeroiUP = (nome) => console.log("Super" , nome);
            superHeroiUP("Helton");

            //Arrow Function com retorno
            let superPoder = () => "Deixar todos carecas!"; 
            let retornoSP = superPoder();
            console.log("O super poder é: ", retornoSP);

            //Arrow Function com passagem de parametro
            let completa = (nome, poder) => `Super Heroi: Super-${nome} com o super poder: ${superPoder}`;
            console.log(completa("Juliana", "Ser pica em php"));

            //Arrow function com passagem ÚNICA de parametro
            let simplesSimples = aluno => `Bem vindo ${aluno}`;
            console.log(simplesSimples("Alex"));

            //Em node fazemos o mínimo de código. 
            //Preste atenção. 


            /*function sum (...number){
                return numbers.reduce ((total, num) => total + num , 0); //zero é o inicio da operação
            }*/
            /*reduce -> função nativa do javascript (redução de array) aplica-se em array, faz conversão
            > array com reduce recebe com parametro uma função
            > não precisa nomear a funcção 
            > primeiro valor (total) é sempre o ultimo valor somado e ou indicado no parametro (zero), 
            sendo a proxima operação, o total sendo o resultado da conta*/

            //Exemplo de Rest Parametros
            function imprimeCarnes (...carnes){
                function comoImprimeAsCarnes(acumulado, atual){
                    return `${acumulado} - ${atual}`
                }
                return carnes.reduce(comoImprimeAsCarnes); //passa a referencia dela
            }
            console.log(imprimeCarnes("Fraldinha", "Ancho", "Costela"));

            let imprimeBebidas = (...bebidas) => bebidas.reduce((anterior, atual)=> anterior +"|" + atual, "");
            console.log(imprimeBebidas("Coca-cola", "Coca-Zero", "Sprite", "Cerveja"));

        </script>
    </head>
    <body>
        <h4>Aula #05 - Funções Sinisitras</h4>
    </body>
</html>
